<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>FigureFlow Piano</title>

  <!-- Libraries -->
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands@0.4/hands.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils@0.3/camera_utils.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/tone/14.8.49/Tone.js"></script>

  <link rel="stylesheet" href="style.css" />
</head>

<body>
  <!-- HEADER -->
  <header class="app-header">
    <div class="brand">
      <img src="logo.png" class="logo" />
      <h2>FIGUREFLOW</h2>
    </div>
    <div class="note-indicator">🎵 <span id="currentNote">--</span></div>
  </header>

  <!-- MAIN -->
  <div class="main-layout">
    <!-- CAMERA -->
    <div class="camera-section">
      <div class="section-title">LIVE CONTROL</div>
      <video id="inputVideo" autoplay muted playsinline></video>
      <canvas id="overlayCanvas"></canvas>
    </div>

    <!-- CONTROL PANEL -->
    <div class="control-panel">
      <div class="panel-title">MODES</div>

      <button class="mode-btn active" id="freestyleBtn">🎹 Free Play</button>
      <button class="mode-btn" id="learnBtn">📚 Learn Sargam</button>

      <button class="mode-btn playground-btn"
        onclick="window.location.href = '../playground/index.html'">
        🎮 Playground Mode
      </button>

      <button class="mode-btn"
        onclick="window.location.href = '../drum/index.html'">
        🥁 Drum Mode
      </button>

      <!-- SARGAM -->
      <div id="sargamBox">
        <div class="panel-title">PLAY THIS:</div>
        <div id="sargamDisplay">Sa</div>
        <div id="sargamHint">Press C4</div>
        <div id="sargamProgress">0 / 8</div>
      </div>
    </div>
  </div>

  <!-- PIANO -->
  <div class="keyboard-wrapper">
    <div class="keyboard" id="keyboard"></div>
  </div>

  <script src="script.js"></script>
</body>
</html>
