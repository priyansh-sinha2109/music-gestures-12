<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>FigureFlow - Piano Mode</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
        min-height: 100vh;
        font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
        color: #fff;
        overflow-x: hidden;
      }

      /* Navigation Bar */
      .nav-bar {
        display: flex;
        justify-content: center;
        gap: 20px;
        padding: 15px;
        background: rgba(0, 0, 0, 0.3);
        border-bottom: 2px solid #00e5ff;
      }

      .nav-btn {
        padding: 12px 30px;
        border: 2px solid #00e5ff;
        background: transparent;
        color: #00e5ff;
        font-size: 16px;
        font-weight: bold;
        cursor: pointer;
        border-radius: 8px;
        transition: all 0.3s ease;
      }

      .nav-btn:hover {
        background: #00e5ff;
        color: #1a1a2e;
        transform: scale(1.05);
      }

      .nav-btn.active {
        background: #00e5ff;
        color: #1a1a2e;
      }

      /* Main Container */
      .main-container {
        display: flex;
        flex-direction: column;
        align-items: center;
        padding: 20px;
        gap: 20px;
      }

      /* Header */
      .header {
        text-align: center;
      }

      .header h1 {
        font-size: 2.5rem;
        background: linear-gradient(90deg, #00e5ff, #ff4081);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        margin-bottom: 10px;
      }

      .hand-info {
        font-size: 14px;
        color: #aaa;
        margin-top: 5px;
      }

      .hand-info strong {
        color: #00e5ff;
      }

      /* Status Display */
      .status-display {
        text-align: center;
        padding: 15px 30px;
        background: rgba(0, 229, 255, 0.1);
        border: 1px solid #00e5ff;
        border-radius: 10px;
        min-width: 400px;
      }

      .status-display #statusText {
        font-size: 16px;
      }

      /* Score */
      .score-display {
        font-size: 24px;
        font-weight: bold;
        color: #00e5ff;
      }

      .score-display.bump {
        animation: bump 0.2s ease;
      }

      @keyframes bump {
        0%,
        100% {
          transform: scale(1);
        }
        50% {
          transform: scale(1.3);
          color: #ff4081;
        }
      }

      /* Controls */
      .controls {
        display: flex;
        gap: 15px;
        flex-wrap: wrap;
        justify-content: center;
      }

      .control-btn {
        padding: 15px 35px;
        border: 2px solid;
        background: transparent;
        font-size: 16px;
        font-weight: bold;
        cursor: pointer;
        border-radius: 10px;
        transition: all 0.3s ease;
      }

      .control-btn:disabled {
        opacity: 0.4;
        cursor: not-allowed;
      }

      .demo-btn {
        border-color: #ff9800;
        color: #ff9800;
      }

      .demo-btn:not(:disabled):hover {
        background: #ff9800;
        color: #1a1a2e;
      }

      .play-btn {
        border-color: #4caf50;
        color: #4caf50;
      }

      .play-btn:not(:disabled):hover {
        background: #4caf50;
        color: #1a1a2e;
      }

      .stop-btn {
        border-color: #f44336;
        color: #f44336;
      }

      .stop-btn:not(:disabled):hover {
        background: #f44336;
        color: #1a1a2e;
      }

      /* Song List */
      .song-list-container {
        text-align: center;
      }

      .song-list-container h3 {
        color: #00e5ff;
        margin-bottom: 10px;
      }

      .song-list {
        display: flex;
        gap: 10px;
        flex-wrap: wrap;
        justify-content: center;
      }

      .song-btn {
        padding: 10px 20px;
        border: 1px solid #666;
        background: transparent;
        color: #aaa;
        cursor: pointer;
        border-radius: 5px;
        transition: all 0.3s ease;
      }

      .song-btn:hover {
        border-color: #00e5ff;
        color: #00e5ff;
      }

      .song-btn.active-song {
        border-color: #00e5ff;
        background: rgba(0, 229, 255, 0.2);
        color: #00e5ff;
      }

      /* Camera Section */
      .camera-section {
        display: flex;
        gap: 20px;
        align-items: flex-start;
        flex-wrap: wrap;
        justify-content: center;
      }

      .camera-container {
        position: relative;
        border: 2px solid #00e5ff;
        border-radius: 10px;
        overflow: hidden;
      }

      #camVideo {
        display: block;
        width: 800px;
        height: 400px;
        transform: scaleX(-1);
      }

      #camCanvas {
        position: absolute;
        top: 0;
        left: 0;
        width: 320px;
        height: 240px;
        transform: scaleX(-1);
      }

      /* Feedback Flash */
      .feedback-flash {
        position: fixed;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        width: 100px;
        height: 100px;
        border-radius: 50%;
        pointer-events: none;
        opacity: 0;
        transition: opacity 0.1s;
      }

      .feedback-flash.flash-green {
        background: rgba(76, 175, 80, 0.7);
        opacity: 1;
      }

      .feedback-flash.flash-red {
        background: rgba(244, 67, 54, 0.7);
        opacity: 1;
      }

      /* Notes Canvas */
      .notes-container {
        width: 100%;
        max-width: 900px;
        height: 150px;
        position: relative;
        background: rgba(0, 0, 0, 0.3);
        border-radius: 10px;
        overflow: hidden;
      }

      #notesCanvas {
        width: 100%;
        height: 100%;
      }

      /* Piano */
      .piano-container {
        width: 100%;
        max-width: 900px;
        position: relative;
        height: 120px;
      }

      #pianoWrap {
        position: relative;
        width: 100%;
        height: 100%;
      }

      /* Piano Keys */
      .key {
        position: absolute;
        height: 100%;
        cursor: pointer;
        transition: all 0.1s;
      }

      .key.white {
        background: linear-gradient(to bottom, #fff 0%, #f0f0f0 100%);
        border: 1px solid #999;
        border-radius: 0 0 5px 5px;
        box-shadow: 0 2px 5px rgba(0, 0, 0, 0.3);
      }

      .key.white:hover {
        background: linear-gradient(to bottom, #e0e0e0 0%, #d0d0d0 100%);
      }

      .key.white.active,
      .key.white.hit-correct {
        background: linear-gradient(to bottom, #00e5ff 0%, #00bcd4 100%);
      }

      .key.white.hit-wrong {
        background: linear-gradient(to bottom, #f44336 0%, #d32f2f 100%);
      }

      .key.white.guide-key {
        box-shadow:
          0 0 20px #ffeb3b,
          inset 0 0 10px rgba(255, 235, 59, 0.5);
        animation: guidePulse 1s infinite;
      }

      .key.black {
        background: linear-gradient(to bottom, #333 0%, #111 100%);
        border: 1px solid #000;
        border-radius: 0 0 4px 4px;
        box-shadow: 0 3px 6px rgba(0, 0, 0, 0.5);
        z-index: 2;
      }

      .key.black:hover {
        background: linear-gradient(to bottom, #444 0%, #222 100%);
      }

      .key.black.active,
      .key.black.hit-correct {
        background: linear-gradient(to bottom, #ff4081 0%, #f50057 100%);
      }

      .key.black.hit-wrong {
        background: linear-gradient(to bottom, #f44336 0%, #d32f2f 100%);
      }

      .key.black.guide-key {
        box-shadow:
          0 0 20px #ffeb3b,
          inset 0 0 10px rgba(255, 235, 59, 0.5);
        animation: guidePulse 1s infinite;
      }

      @keyframes guidePulse {
        0%,
        100% {
          box-shadow: 0 0 20px #ffeb3b;
        }
        50% {
          box-shadow: 0 0 40px #ffeb3b;
        }
      }

      /* Hand Instructions */
      .hand-instructions {
        display: flex;
        gap: 30px;
        justify-content: center;
        margin-top: 10px;
      }

      .hand-instruction {
        display: flex;
        align-items: center;
        gap: 10px;
        padding: 10px 20px;
        border-radius: 8px;
      }

      .hand-instruction.right {
        border: 2px solid #00e5ff;
      }

      .hand-instruction.left {
        border: 2px solid #ff4081;
      }

      .hand-icon {
        font-size: 24px;
      }

      .hand-text {
        font-size: 14px;
      }

      .hand-text strong {
        display: block;
        font-size: 16px;
      }
    </style>
  </head>
  <body>
    <!-- Navigation Bar -->
    <div class="nav-bar">
      <button class="nav-btn active" id="pianoNavBtn">🎹 Piano</button>
      <button class="nav-btn" id="drumNavBtn">🥁 Drum</button>
    </div>

    <div class="main-container">
      <!-- Header -->
      <div class="header">
        <h1>🎹 PLayground Mode</h1>
        <div class="hand-info">
          <strong>RIGHT hand</strong> → White Keys &nbsp;|&nbsp;
          <strong>LEFT hand</strong> → Black Keys
        </div>
      </div>

      <!-- Status -->
      <div class="status-display">
        <div id="statusText">
          Press <strong>Demo</strong> or <strong>Play</strong> to start
        </div>
      </div>

      <!-- Score -->
      <div class="score-display">Score: <span id="scoreDisplay">0</span></div>

      <!-- Controls -->
      <div class="controls">
        <button class="control-btn demo-btn" id="demoBtn">▶ Demo</button>
        <button class="control-btn play-btn" id="playBtn">🎮 Play</button>
        <button class="control-btn stop-btn" id="stopBtn" disabled>
          ⏹ Stop
        </button>
      </div>

      <!-- Song List -->
      <div class="song-list-container">
        <h3>Select Song:</h3>
        <div class="song-list" id="songList"></div>
      </div>

      <!-- Camera Section -->
      <div class="camera-section">
        <div class="camera-container">
          <video id="camVideo" autoplay playsinline></video>
          <canvas id="camCanvas"></canvas>
        </div>
        <div id="handInfo" style="color: #aaa; padding: 10px">
          No hands detected
        </div>
      </div>

      <!-- Hand Instructions -->
      <div class="hand-instructions">
        <div class="hand-instruction right">
          <span class="hand-icon">✋</span>
          <div class="hand-text">
            <strong>Right Hand</strong>
            Play WHITE keys
          </div>
        </div>
        <div class="hand-instruction left">
          <span class="hand-icon">🤚</span>
          <div class="hand-text">
            <strong>Left Hand</strong>
            Play BLACK keys
          </div>
        </div>
      </div>

      <!-- Notes Canvas -->
      <div class="notes-container">
        <canvas id="notesCanvas"></canvas>
      </div>

      <!-- Piano -->
      <div class="piano-container">
        <div id="pianoWrap"></div>
      </div>
    </div>

    <!-- Feedback Flash -->
    <div class="feedback-flash" id="feedbackFlash"></div>

    <!-- MediaPipe Scripts -->
    <script
      src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"
      crossorigin="anonymous"
    ></script>
    <script
      src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"
      crossorigin="anonymous"
    ></script>

    <script>
      // Piano button → go to piano page
      document.getElementById("pianoNavBtn").addEventListener("click", () => {
        window.location.href = "../piano/index.html";
      });

      // Drum button → go to drum page
      document.getElementById("drumNavBtn").addEventListener("click", () => {
        window.location.href = "../drum/index.html";
      });
    </script>
    <!-- Main Script -->
    <script src="script.js"></script>
  </body>
</html>
